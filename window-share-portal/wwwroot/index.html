<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Window Share Portal</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <section id="login-panel" class="login-screen">
        <form id="login-form" class="login-box" method="post" action="javascript:void(0)">
            <h1>Window Share Portal</h1>
            <p>接続パスワードを入力してください。</p>
            <input id="login-token" name="token" type="password" placeholder="Password" autocomplete="off" required>
            <button type="submit">Log In</button>
            <p id="login-error" class="login-error" hidden></p>
        </form>
    </section>

    <section id="workspace" class="workspace-shell" hidden>
        <div class="viewer-surface">
            <div class="viewer-overlay">
                <button id="menu-button" class="menu-button" type="button" aria-label="Open menu">&#9776;</button>
                <button id="window-prev-button" class="header-nav-button" type="button" aria-label="Previous window">&#8249;</button>
                <p id="viewer-window-title" class="viewer-window-title">No window selected</p>
                <button id="window-next-button" class="header-nav-button" type="button" aria-label="Next window">&#8250;</button>
            </div>

            <div class="frame-stage">
                <video id="window-frame" autoplay muted playsinline disablepictureinpicture hidden></video>
                <div id="frame-cursor" class="frame-cursor" hidden aria-hidden="true"></div>
                <p id="frame-placeholder" class="frame-placeholder">Frame preview will appear here.</p>
                <div id="scroll-pad" class="scroll-rail" aria-label="scroll rail">
                    <span class="scroll-rail-track" aria-hidden="true"></span>
                </div>
            </div>

            <p id="viewer-status" class="viewer-status">No connection.</p>

            <form id="text-form" class="text-dock">
                <div class="text-dock-row text-dock-row-main">
                    <input id="text-input" name="text" type="text" placeholder="text input" disabled>
                    <button id="text-submit" type="submit" disabled>Send</button>
                </div>
                <div class="text-dock-row text-dock-row-keys">
                    <button class="quick-key-button" data-key="Escape" type="button" disabled>Esc</button>
                    <button class="quick-key-button" data-key="Up" type="button" disabled>&#8593;</button>
                    <button class="quick-key-button" data-key="Down" type="button" disabled>&#8595;</button>
                    <button class="quick-key-button" data-key="Left" type="button" disabled>&#8592;</button>
                    <button class="quick-key-button" data-key="Right" type="button" disabled>&#8594;</button>
                    <button class="quick-key-button" data-key="Tab" type="button" disabled>Tab</button>
                    <button class="quick-key-button" data-key="Backspace" type="button" disabled>BS</button>
                    <button class="quick-key-button" data-key="Ctrl+C" type="button" disabled>C+C</button>
                    <button class="quick-key-button" data-key="Ctrl+V" type="button" disabled>C+V</button>
                </div>
            </form>
        </div>

        <div id="drawer-backdrop" class="drawer-backdrop" hidden></div>

        <aside id="side-drawer" class="side-drawer" aria-hidden="true">
            <div class="drawer-header">
                <strong class="drawer-title">Window Share Portal</strong>
                <button id="drawer-close-button" class="drawer-close" type="button">&#10005;</button>
            </div>

            <div class="drawer-body">
                <section class="drawer-section">
                    <h3 id="selected-title">No window selected</h3>
                    <p id="selected-meta" class="subtle-copy">一覧から選択してください。</p>
                    <div class="button-row">
                        <button id="activate-button" class="ghost-button" type="button" disabled>Activate</button>
                        <button id="frame-refresh-button" class="ghost-button" type="button" disabled>Reconnect</button>
                    </div>
                </section>

                <section class="drawer-section">
                    <h3>Stream</h3>
                    <div class="stream-mode-row">
                        <button class="stream-mode-button active" data-stream-mode="low-latency" type="button">Speed</button>
                        <button class="stream-mode-button" data-stream-mode="balanced" type="button">Balance</button>
                        <button class="stream-mode-button" data-stream-mode="high-quality" type="button">Quality</button>
                    </div>
                    <p id="stream-mode-hint" class="subtle-copy">Speed: 低遅延優先。</p>
                    <div class="video-codec-row">
                        <button class="video-codec-button active" data-video-codec="auto" type="button">Auto</button>
                        <button class="video-codec-button" data-video-codec="vp8" type="button">VP8</button>
                        <button class="video-codec-button" data-video-codec="vp9" type="button">VP9</button>
                        <button class="video-codec-button" data-video-codec="av1" type="button">AV1</button>
                    </div>
                    <p id="video-codec-hint" class="subtle-copy">Auto: 利用可能な codec の中から最適なものを使います。</p>
                    <div class="fps-row">
                        <label for="frame-rate-select">FPS</label>
                        <select id="frame-rate-select" class="setting-select">
                            <option value="15">15</option>
                            <option value="30" selected>30</option>
                            <option value="45">45</option>
                            <option value="60">60</option>
                        </select>
                    </div>
                </section>

                <section class="drawer-section">
                    <div class="section-header">
                        <h3>Windows</h3>
                        <button id="refresh-button" class="ghost-button" type="button">Refresh</button>
                    </div>
                    <div class="button-row">
                        <button id="launch-explorer" class="ghost-button" type="button">Explorer</button>
                        <button id="launch-cmd" class="ghost-button" type="button">CMD</button>
                    </div>
                    <label class="filter-toggle">
                        <input id="filter-wt-checkbox" type="checkbox">
                        <span>Windows Terminal のみ</span>
                    </label>
                    <div id="window-list" class="window-list"></div>
                </section>

            </div>

            <div class="drawer-footer">
                <button id="logout-button" class="ghost-button" type="button" hidden>Log out</button>
            </div>
        </aside>
    </section>

    <script src="/app.js" defer></script>
</body>
</html>
