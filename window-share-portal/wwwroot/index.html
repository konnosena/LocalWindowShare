<!doctype html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>Local Window Share</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <section id="login-panel" class="login-screen">
        <form id="login-form" class="login-box" method="post" action="javascript:void(0)">
            <h1>Local Window Share</h1>
            <p>接続パスワードを入力してください。</p>
            <input id="login-token" name="token" type="password" placeholder="Password" autocomplete="off" required>
            <button type="submit">Log In</button>
            <p id="login-error" class="login-error" hidden></p>
        </form>
    </section>

    <section id="workspace" class="workspace-shell" hidden>
        <div class="viewer-surface">
            <div class="viewer-overlay">
                <button id="menu-button" class="menu-button" type="button" aria-label="Open menu">&#9776;</button>
                <div class="mode-toggle">
                    <button id="mode-window-button" class="mode-toggle-button active" type="button">Win</button>
                    <button id="mode-monitor-button" class="mode-toggle-button" type="button">Mon</button>
                </div>
                <button id="resize-toggle-button" class="header-toggle-button" type="button" disabled>Resize</button>
                <button id="center-button" class="header-toggle-button" type="button">Center</button>
                <div class="mode-toggle">
                    <button id="touch-mode-pointer" class="mode-toggle-button active" type="button">Ptr</button>
                    <button id="touch-mode-direct" class="mode-toggle-button" type="button">Touch</button>
                </div>
                <button id="window-prev-button" class="header-nav-button" type="button" aria-label="Previous">&#8249;</button>
                <button id="window-next-button" class="header-nav-button" type="button" aria-label="Next">&#8250;</button>
            </div>

            <div class="frame-stage">
                <video id="window-frame" autoplay muted playsinline disablepictureinpicture hidden></video>
                <div id="frame-cursor" class="frame-cursor" hidden aria-hidden="true"></div>
                <p id="frame-placeholder" class="frame-placeholder">Frame preview will appear here.</p>
                <div id="scroll-pad-left" class="scroll-rail scroll-rail-left" aria-label="scroll rail left">
                    <span class="scroll-rail-track" aria-hidden="true"></span>
                </div>
                <div id="scroll-pad" class="scroll-rail" aria-label="scroll rail">
                    <span class="scroll-rail-track" aria-hidden="true"></span>
                </div>
            </div>

            <div id="info-bar" class="info-bar">
                <p id="viewer-window-title" class="info-bar-title">No window selected</p>
                <p id="viewer-status" class="info-bar-status">No connection.</p>
            </div>

            <form id="text-form" class="text-dock">
                <div class="text-dock-row text-dock-row-main">
                    <input id="text-input" name="text" type="text" placeholder="text input" disabled>
                    <button id="text-submit" type="submit" disabled>&#9166;</button>
                </div>
                <div class="text-dock-row text-dock-row-keys">
                    <button class="quick-key-button" data-key="Escape" type="button" disabled>Esc</button>
                    <button class="quick-key-button" data-key="Ctrl+C" type="button" disabled>C+C</button>
                    <button class="quick-key-button" data-key="Ctrl+V" type="button" disabled>C+V</button>
                    <button class="quick-key-button" data-key="Up" type="button" disabled>&#9650;</button>
                    <button class="quick-key-button" data-key="Down" type="button" disabled>&#9660;</button>
                    <button class="quick-key-button" data-key="Left" type="button" disabled>&#9664;</button>
                    <button class="quick-key-button" data-key="Right" type="button" disabled>&#9654;</button>
                    <button class="quick-key-button" data-key="Tab" type="button" disabled>Tab</button>
                    <button class="quick-key-button" data-key="Backspace" type="button" disabled>BS</button>
                </div>
            </form>
        </div>

        <div id="drawer-backdrop" class="drawer-backdrop" hidden></div>

        <aside id="side-drawer" class="side-drawer" aria-hidden="true">
            <div class="drawer-header">
                <strong class="drawer-title">Local Window Share</strong>
                <button id="drawer-close-button" class="drawer-close" type="button">&#10005;</button>
            </div>

            <div class="drawer-body">
                <section class="drawer-section">
                    <h3 id="selected-title">No window selected</h3>
                    <p id="selected-meta" class="subtle-copy">一覧から選択してください。</p>
                    <div class="button-row">
                        <button id="activate-button" class="ghost-button" type="button" disabled>Activate</button>
                        <button id="frame-refresh-button" class="ghost-button" type="button" disabled>Reconnect</button>
                    </div>
                </section>

                <section class="drawer-section">
                    <h3>Stream</h3>
                    <div class="stream-mode-row">
                        <button class="stream-mode-button active" data-stream-mode="low-latency" type="button">Speed</button>
                        <button class="stream-mode-button" data-stream-mode="balanced" type="button">Balance</button>
                        <button class="stream-mode-button" data-stream-mode="high-quality" type="button">Quality</button>
                    </div>
                    <p id="stream-mode-hint" class="subtle-copy">Speed: 低遅延優先。</p>
                    <div class="video-codec-row">
                        <button class="video-codec-button active" data-video-codec="auto" type="button">Auto</button>
                        <button class="video-codec-button" data-video-codec="vp8" type="button">VP8</button>
                        <button class="video-codec-button" data-video-codec="vp9" type="button">VP9</button>
                    </div>
                    <p id="video-codec-hint" class="subtle-copy">Auto: 利用可能な codec の中から最適なものを使います。</p>
                    <div class="settings-inline-row">
                        <div class="fps-row">
                            <label for="frame-rate-select">FPS</label>
                            <select id="frame-rate-select" class="setting-select">
                                <option value="15">15</option>
                                <option value="30" selected>30</option>
                                <option value="45">45</option>
                                <option value="60">60</option>
                            </select>
                        </div>
                        <div class="fps-row">
                            <label for="resize-scale-select">Resize</label>
                            <select id="resize-scale-select" class="setting-select">
                                <option value="1">x1</option>
                                <option value="1.5">x1.5</option>
                                <option value="2">x2</option>
                                <option value="3" selected>x3</option>
                                <option value="4">x4</option>
                            </select>
                        </div>
                    </div>
                </section>

                <section class="drawer-section">
                    <div class="section-header">
                        <h3>Windows</h3>
                        <button id="refresh-button" class="ghost-button" type="button">Refresh</button>
                    </div>
<div class="select-row">
                        <button id="select-all-button" class="ghost-button" type="button">All</button>
                        <button id="select-wt-button" class="ghost-button" type="button">WT</button>
                        <button id="select-none-button" class="ghost-button" type="button">None</button>
                    </div>
                    <div id="window-list" class="window-list"></div>
                </section>

                <section class="drawer-section">
                    <h3>Monitors</h3>
                    <div id="monitor-list" class="window-list"></div>
                </section>

                <section class="drawer-section">
                    <h3>Launch</h3>
                    <div class="button-row">
                        <button id="launch-explorer" class="ghost-button" type="button">Explorer</button>
                        <button id="launch-cmd" class="ghost-button" type="button">CMD</button>
                    </div>
                </section>

                <section class="drawer-section">
                    <h3>Custom Keys</h3>
                    <div id="custom-key-list" class="custom-key-list"></div>
                    <div class="custom-key-form">
                        <div class="custom-key-modifiers">
                            <button id="mod-ctrl" class="modifier-button" type="button">Ctrl</button>
                            <button id="mod-shift" class="modifier-button" type="button">Shift</button>
                            <button id="mod-alt" class="modifier-button" type="button">Alt</button>
                            <button id="mod-win" class="modifier-button" type="button">Win</button>
                        </div>
                        <div class="custom-key-inputs">
                            <div class="key-combo-wrapper">
                                <input id="custom-key-input" type="text" placeholder="Key..." class="custom-key-text" autocomplete="off">
                                <div id="key-dropdown" class="key-dropdown" hidden></div>
                            </div>
                            <span></span>
                        </div>
                        <div class="custom-key-inputs">
                            <input id="custom-key-label" type="text" placeholder="Label (任意)" class="custom-key-text">
                            <button id="custom-key-add" class="ghost-button" type="button">Add</button>
                        </div>
                    </div>
                </section>

            </div>

            <div class="drawer-footer">
                <button id="logout-button" class="ghost-button" type="button" hidden>Log out</button>
            </div>
        </aside>
    </section>

    <script src="/app.js" defer></script>
</body>
</html>
